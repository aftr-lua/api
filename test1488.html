<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space X Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --box-bg: #0a0a0a;
            --border-color: #27272a;
            --btn-white: #ffffff;
            --btn-dark: #18181b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.8; }
            to { transform: translateY(-100vh); opacity: 0; }
        }

        .glow-bg {
            position: absolute;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .navbar-container {
            padding: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
            position: absolute;
            top: 0;
            z-index: 10;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 20px;
            width: 100%;
            max-width: 900px;
            backdrop-filter: blur(10px);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            width: 2%;
            height: 2%;
        }

        .nav-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            background: #1f1f22;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .center-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            width: 100px;
            height: 100px;
        }

        .icon-btn:hover {
            color: #fff;
            background: #27272a;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-top: 80px;
            z-index: 2;
        }


        .version-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .title {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
            font-weight: 400;
        }

        .code-container {
            width: 100%;
            max-width: 960px;
            background: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .code-container:hover {
            border-color: #3f3f46;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.02);
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            color: #e4e4e7;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
            letter-spacing: -0.3px;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.1s;
        }

        .copy-btn:hover {
            color: #fff;
        }
        
        .copy-btn:active {
            transform: scale(0.95);
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--btn-white);
            color: #000;
            border: none;
        }

        .btn-primary:hover {
            background-color: #e4e4e7;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--btn-dark);
            color: #fff;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #27272a;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .title { font-size: 2.5rem; }
            .subtitle { font-size: 1rem; margin-bottom: 20px; }
            .code-container { padding: 12px 14px; margin-bottom: 20px; }
            code { font-size: 0.75rem; }
            .button-group { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

    <div id="space"></div>
    <div class="glow-bg"></div>

    <div class="navbar-container">
        <nav class="navbar">
            <div class="nav-left">
                <div class="nav-logo-icon"><img src="https://iili.io/C2Vk1FS.th.png" width="40"></div>
            </div>
            <div class="nav-right">
                <button class="icon-btn" title="Telegram">
                  <a href="https://t.me/spacexhubnews" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" svg width="30" height="30" viewBox="0 0 16 16" fill="currentColor" class="bi bi-telegram">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.287 5.906q-1.168.486-4.666 2.01-.567.225-.595.442c-.03.243.275.339.69.47l.175.055c.408.133.958.288 1.243.294q.39.01.868-.32 3.269-2.206 3.374-2.23c.05-.012.12-.026.166.016s.042.12.037.141c-.03.129-1.227 1.241-1.846 1.817-.193.18-.33.307-.358.336a8 8 0 0 1-.188.186c-.38.366-.664.64.015 1.088.327.216.589.393.85.571.284.194.568.387.936.629q.14.092.27.187c.331.236.63.448.997.414.214-.02.435-.22.547-.82.265-1.417.786-4.486.906-5.751a1.4 1.4 0 0 0-.013-.315.34.34 0 0 0-.114-.217.53.53 0 0 0-.31-.093c-.3.005-.763.166-2.984 1.09"/>
                    </svg>
                  </a>
                </button>
            </div>
        </nav>
    </div>

    <main class="main-content">
        
        <div class="pulse-wrapper">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="center-logo"><img src="https://iili.io/C2Vk1FS.th.png"></div>
        </div>

        <div class="version-badge">Script under development</div>

        <h1 class="title">Space X Hub</h1>
        <p class="subtitle">A powerful script hub with ultimate features</p>

        <div class="code-container">
            <code id="scriptCode">print("Hello, World!")</code>
            <button class="copy-btn" onclick="copyCode()" title="Copy script">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>

        <div class="button-group">
            <a href="https://t.me/spacexhubnews/" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                </svg>
                Join Telegram
            </a>
        </div>
    </main>

    <script>

        function createStars() {
            const space = document.getElementById('space');
            const starCount = 120;

            for (let i = 0; i < starCount; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                
                let size = Math.random() * 2.5;
                let x = Math.random() * 100;
                let y = Math.random() * 100;
                let duration = Math.random() * 15 + 10;
                let delay = Math.random() * 10;

                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = x + 'vw';
                star.style.top = y + 'vh';
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = delay + 's';

                space.appendChild(star);
            }
        }
function copyCode() {
            const codeText = document.getElementById('scriptCode').innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                alert('Script was copied! Wish you a good game :)');
            }).catch(err => {
                console.error('Error: ', err);
            });
        }

        window.onload = createStars;
    </script>
</body>
</html>
